*{margin:0;padding:0;box-sizing:border-box}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.28s}

.frame{position:relative;height:230px;overflow:hidden;background:#000;border-bottom:1px solid var(--line)}
.frame iframe{position:absolute;top:0;left:0;width:1280px;height:900px;transform:scale(.36);transform-origin:top left;border:0;pointer-events:none}
.frame .ov{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;transition:.28s;background:rgba(8,8,14,.55)}
.card:hover .frame .ov{opacity:1}
.frame .ov span{background:#fff;color:#0a0a0f;font-family:'Sora';font-weight:700;font-size:14px;padding:11px 26px;border-radius:30px}
.meta{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.meta h3{font-size:18px;font-weight:700;margin-bottom:3px}
.meta .c{color:var(--mut);font-size:13px}
.pill{font-size:11px;font-weight:600;font-family:'Sora';padding:5px 12px;border-radius:20px;white-space:nowrap;background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac);border:1px solid color-mix(in srgb,var(--ac) 30%,transparent)}
.modal{position:fixed;inset:0;z-index:50;background:rgba(5,5,9,.85);backdrop-filter:blur(8px);display:none;flex-direction:column}
.modal.open{display:flex}

.mbar .t{flex:1}.mbar .t b{font-family:'Sora';font-size:17px}.mbar .t span{color:var(--mut);font-size:13px;margin-left:10px}

.dl{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#0a0a0f}
.cl{background:var(--card);color:var(--txt);border:1px solid var(--line)!important}
.mbody{flex:1;background:#000}.mbody iframe{width:100%;height:100%;border:0}

  mFrame.srcdoc=TPL[i].doc; modal.classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ modal.classList.remove('open'); mFrame.srcdoc=''; document.body.style.overflow=''; }
document.getElementById('clBtn').onclick=closeModal;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('dlBtn').onclick=()=>{
  const t=TPL[current];
  const blob=new Blob([t.doc],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const safe=t.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase();
  a.href=url; a.download=safe+'.html';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};
</script>
</body></html>

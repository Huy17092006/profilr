<style>
*{margin:0;padding:0;box-sizing:border-box}

.dl{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#0a0a0f}
.cl{background:var(--card);color:var(--txt);border:1px solid var(--line)!important}
.mbody{flex:1;background:#000}.mbody iframe{width:100%;height:100%;border:0}
footer{text-align:center;padding:30px 0 50px;color:var(--mut);font-size:14px;border-top:1px solid var(--line)}
@media(max-width:980px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.grid{grid-template-columns:1fr}.frame{height:280px}.frame iframe{transform:scale(.5)}}

const grid = document.getElementById('grid');
TPL.forEach((t,i)=>{
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="frame">
      <iframe loading="lazy" sandbox="allow-same-origin"></iframe>
      <div class="ov"><span>Xem full →</span></div>
    </div>
    <div class="meta">
      <div><h3>${t.name}</h3><div class="c">${t.cat}</div></div>
      <span class="pill">${t.type}</span>
    </div>`;
  card.querySelector('iframe').srcdoc = t.doc;
  card.addEventListener('click', ()=>openModal(i));
  grid.appendChild(card);
});
const modal=document.getElementById('modal'), mFrame=document.getElementById('mFrame');
let current=0;
function openModal(i){
  current=i;
  document.getElementById('mName').textContent=TPL[i].name;
  document.getElementById('mCat').textContent=TPL[i].type+' · '+TPL[i].cat;
  mFrame.srcdoc=TPL[i].doc; modal.classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ modal.classList.remove('open'); mFrame.srcdoc=''; document.body.style.overflow=''; }
document.getElementById('clBtn').onclick=closeModal;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('dlBtn').onclick=()=>{
  const t=TPL[current];
  const blob=new Blob([t.doc],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const safe=t.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase();
  a.href=url; a.download=safe+'.html';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};
